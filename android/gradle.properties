# Project-wide Gradle settings.
# Requires JDK 17+. If your system default is older, point Gradle at one via
# org.gradle.java.home in your user-level ~/.gradle/gradle.properties (not
# this file, since that path is machine-specific) or JAVA_HOME.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
